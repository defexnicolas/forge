default_agent = 'build'
# 'auto' = bypass per-mutation approval prompts (write_file/edit_file/
# apply_patch/run_command). The audit trail (diff in tool result, undo
# stack, git snapshot) is preserved. 'normal' restores the per-action
# prompt.
approval_profile = 'auto'

# permissions_profile controls which run_command invocations are allowed
# without prompting. Defaults to 'normal'. Available profiles:
#   safe    — every command requires approval (only the destructive denylist runs straight to Deny).
#   normal  — go test / git status / git diff allowed; npm/pnpm/yarn test ask; curl/wget/rm denied.
#   fast    — adds npm run / pnpm run / make / cargo test / pytest to allow; same denylist as normal.
#   trusted — installers (npm/pnpm/pip/cargo/apt/brew/winget), Docker, curl/wget allowed without prompt.
#             Strictly destructive ops (rm -rf /, mkfs, force-push, format, shutdown) still denied.
#             Use this when you want the agent to install dependencies, pull docker images, and
#             configure containerized runtimes (e.g. running Node 20 via `docker run` when the host
#             only has Node 18) without manual approval at every step.
#   yolo    — everything allowed except the destructive denylist.
# permissions_profile = 'normal'

[model_loading]
# All slots LM Studio supports. Subagent fan-out (build / explore) follows
# this value when their concurrency isn't explicitly set lower.
enabled = true
strategy = 'parallel'
parallel_slots = 4

[providers]
[providers.default]
name = 'lmstudio'

[providers.openai_compatible]
type = 'openai-compatible'
base_url = 'https://api.openai.com/v1'
api_key = ''
api_key_env = 'OPENAI_API_KEY'
default_model = 'gpt-5.4-mini'
supports_tools = true

[providers.lmstudio]
type = 'openai-compatible'
base_url = 'http://localhost:1234/v1'
api_key = 'lm-studio'
api_key_env = ''
default_model = 'local-model'
supports_tools = true

[context]
engine = 'yarn'
budget_tokens = 12000
auto_compact = true

[context.task]
budget_tokens = 12000
max_file_bytes = 30000
history_events = 12

[runtime]
# 0 = no wall-clock deadline. With slow local models (LM Studio + 12k-token
# prompts), prompt processing alone can exceed any sane wall-clock cap.
# request_idle_timeout_seconds is the safety net: it cancels the request if
# the provider stops emitting SSE chunks for that long *after* the first
# chunk, so dead/hung backends still surface as timeouts.
request_timeout_seconds = 0
request_idle_timeout_seconds = 180
subagent_timeout_seconds = 0
task_timeout_seconds = 0
retry_on_provider_timeout = true
# Read-budget guards. Higher than the old 6/8 because plan-mode interviews
# and build-mode multi-task work both legitimately read several files
# before doing anything mutating. Cache-served reads no longer count.
max_consecutive_read_only = 10
max_builder_read_loops = 12
# Build mode legitimately runs longer (multi-task implementations).
# Plan mode stays at the safer 40 default.
max_steps = 40
max_steps_build = 120

[skills]
cli = 'npx'
directory_url = 'https://skills.sh/'
repositories = ['vercel-labs/agent-skills', 'vercel-labs/skills']
agent = 'codex'
install_scope = 'project'
copy = true

[plugins]
enabled = true
marketplaces = []

[models]
chat = 'local-model'
editor = 'local-model'
planner = 'local-model'
reviewer = 'local-model'
summarizer = 'local-model'
